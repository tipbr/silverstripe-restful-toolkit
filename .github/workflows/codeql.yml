name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '20 3 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (php)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: github/codeql-action/init@7fd177fa680c9881b53cdab4d346d32574c9f7f4
        with:
          languages: php
      - uses: github/codeql-action/autobuild@7fd177fa680c9881b53cdab4d346d32574c9f7f4
      - uses: github/codeql-action/analyze@7fd177fa680c9881b53cdab4d346d32574c9f7f4
